<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 39" width="36" height="39">
  <!-- Shown when satellite layer is ON — click to turn it OFF -->
  <defs>
    <clipPath id="gc">
      <circle cx="11" cy="27" r="10"/>
    </clipPath>
    <radialGradient id="gg" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#72b8f0"/>
      <stop offset="100%" stop-color="#1a5fa8"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="35" height="38" rx="5.5" fill="#fff" stroke="#c8c8c8" stroke-width="1"/>

  <!-- Globe ocean -->
  <circle cx="11" cy="27" r="10" fill="url(#gg)"/>
  <!-- Africa landmass -->
  <g clip-path="url(#gc)">
    <path d="M 9.5,18 C 12,17.5 14.5,19 15.5,22 C 17,25 16,29 15,31.5
             C 13.5,34 11.5,36 10,35.5 C 8.5,35 7,33 7,30
             C 6.5,27 7,23 8.5,20.5 Z" fill="#4caf50"/>
    <path d="M 14.5,21.5 C 16,21 17,22.5 16,24 C 15,25 13.5,24 14.5,22 Z" fill="#4caf50"/>
  </g>
  <circle cx="11" cy="27" r="10" fill="none" stroke="#1a56a0" stroke-width="0.7"/>

  <!-- Satellite: cross shape centered at (24,11), body runs SW-NE (rotate -45°) -->
  <g transform="translate(24,11) rotate(-45)">
    <!-- Body (horizontal in local = SW-NE after rotation) -->
    <rect x="-8" y="-2" width="16" height="4" rx="1.5" fill="#1c1c1c"/>
    <!-- Panel left side (above in local = upper-left/NW after rotation) -->
    <rect x="-5" y="-6.5" width="10" height="4.5" rx="0.5" fill="#1c1c1c"/>
    <!-- Panel right side (below in local = lower-right/SE after rotation) -->
    <rect x="-5" y="2" width="10" height="4.5" rx="0.5" fill="#1c1c1c"/>
  </g>
</svg>
