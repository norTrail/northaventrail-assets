<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 39" width="36" height="39">
  <!-- Shown when satellite layer is OFF — click to turn it ON -->
  <defs>
    <clipPath id="globe-clip2">
      <circle cx="11" cy="28" r="10"/>
    </clipPath>
    <radialGradient id="globe-grad2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6ab0e8"/>
      <stop offset="100%" stop-color="#2a6db5"/>
    </radialGradient>
  </defs>

  <!-- Rounded white background -->
  <rect x="0.5" y="0.5" width="35" height="38" rx="5.5" fill="white" stroke="#c8c8c8" stroke-width="1"/>

  <!-- Globe: ocean -->
  <circle cx="11" cy="28" r="10" fill="url(#globe-grad2)"/>

  <!-- Globe: Africa landmass (clipped) -->
  <g clip-path="url(#globe-clip2)">
    <path d="M 10,19 C 12,18 14,19 15,21 C 16,23 16,26 15,29 C 14,32 12,34 11,34 C 10,34 8,33 8,30 C 7,27 7,24 8,22 C 8.5,20 9,19 10,19 Z" fill="#4caf50"/>
    <path d="M 14,23 C 16,23 17,24 16,25 C 15,26 14,25 14,24 Z" fill="#4caf50"/>
  </g>

  <!-- Globe border -->
  <circle cx="11" cy="28" r="10" fill="none" stroke="#1e5a9e" stroke-width="0.7"/>

  <!-- Signal arcs (concentric, from lower-left of globe) -->
  <g fill="none" stroke="#555" stroke-linecap="round" opacity="0.85">
    <path d="M 4,32 A 4,4 0 0 1 7,28.5" stroke-width="1.3"/>
    <path d="M 2.5,33.5 A 7,7 0 0 1 6,27" stroke-width="1.1"/>
    <path d="M 1,35 A 10.5,10.5 0 0 1 5,25" stroke-width="0.9"/>
  </g>

  <!-- Satellite: body diagonal upper-right, panels perpendicular -->
  <g transform="translate(24,11) rotate(-42)">
    <!-- Body -->
    <rect x="-8" y="-2.5" width="16" height="5" rx="1.5" fill="#1a1a1a"/>
    <!-- Solar panel A -->
    <rect x="-5.5" y="-7" width="4.5" height="4.5" rx="0.5" fill="#1a1a1a"/>
    <!-- Solar panel B -->
    <rect x="1" y="-7" width="4.5" height="4.5" rx="0.5" fill="#1a1a1a"/>
    <!-- Dish stub -->
    <circle cx="7" cy="0" r="1.5" fill="none" stroke="#444" stroke-width="0.8"/>
    <line x1="7" y1="-2.5" x2="7" y2="-1.5" stroke="#444" stroke-width="0.6"/>
  </g>
</svg>
