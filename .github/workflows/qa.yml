name: QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract checks
        run: npm run qa:contracts

      - name: Run smoke checks
        run: npm run qa:smoke

      - name: Run interactive checks
        run: npm run qa:interactive

      - name: Run accessibility checks
        run: npm run qa:a11y
